<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Laptop Dashboard</title>

  <style>
    :root {
      --bg: #050816;
      --card-bg: #0d1224;
      --accent: #5b8dff;
      --accent2: #9b5bff;
      --text-main: #f5f5f7;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: radial-gradient(circle at top, #1a1f3a 0, #050816 55%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
    }

    .container {
      width: 1100px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(91,141,255,0.15), rgba(155,91,255,0.15));
      border: 1px solid rgba(148,163,255,0.4);
      font-size: 12px;
      color: var(--text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1.5fr;
      gap: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: radial-gradient(circle at top left, rgba(91,141,255,0.12), transparent 55%),
                  radial-gradient(circle at bottom right, rgba(155,91,255,0.12), transparent 55%),
                  var(--card-bg);
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(148,163,255,0.18);
      backdrop-filter: blur(16px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.75);
      border-color: rgba(148,163,255,0.4);
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .metric-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .metric-value {
      font-size: 18px;
      font-weight: 600;
    }

    .bar {
      width: 100%;
      height: 9px;
      background: #111827;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px rgba(91,141,255,0.7);
      transition: width 0.3s ease;
    }

    .pill-small {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,255,0.3);
      font-size: 11px;
      color: var(--text-muted);
    }

    .pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.8);
    }

    .updated {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
    }

    canvas {
      width: 100% !important;
      height: 220px !important;
    }

    .info-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .info-label {
      color: var(--text-muted);
    }

    .info-value {
      color: var(--text-main);
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="title">Laptop Dashboard</div>
        <div class="subtitle">Live system metrics from your machine</div>
      </div>
      <div class="pill">
        <span id="status-dot">●</span> <span id="status-text">Connecting…</span>
      </div>
    </div>

    <div class="grid">
      <!-- Left: main metrics + graph -->
      <div class="card">
        <div class="section-title">Performance</div>

        <div class="grid-2" style="margin-bottom: 16px;">
          <div>
            <div class="metric-row">
              <div class="metric-label">CPU Usage</div>
              <div class="metric-value" id="cpu-text">–</div>
            </div>
            <div class="bar"><div class="bar-fill" id="cpu-bar"></div></div>
          </div>

          <div>
            <div class="metric-row">
              <div class="metric-label">RAM Usage</div>
              <div class="metric-value" id="ram-text">–</div>
            </div>
            <div class="bar"><div class="bar-fill" id="ram-bar"></div></div>
          </div>

          <div>
            <div class="metric-row">
              <div class="metric-label">GPU Usage</div>
              <div class="metric-value" id="gpu-text">–</div>
            </div>
            <div class="bar"><div class="bar-fill" id="gpu-bar"></div></div>
          </div>

          <div>
            <div class="metric-row">
              <div class="metric-label">Battery</div>
              <div class="metric-value" id="battery-text">–</div>
            </div>
            <div class="bar"><div class="bar-fill" id="battery-bar"></div></div>
          </div>
        </div>

        <div class="metric-row" style="margin-top: 10px; margin-bottom: 8px;">
          <div class="metric-label">Last 60s</div>
          <div class="pill-small">
            <span class="pill-dot"></span>
            Live stream
          </div>
        </div>
        <canvas id="perf-chart"></canvas>

        <div class="updated" id="updated">Waiting for data…</div>
      </div>

      <!-- Right: system + storage/network -->
      <div class="grid-2">
        <div class="card">
          <div class="section-title">System</div>
          <div class="info-list">
            <div class="info-label">OS</div><div class="info-value" id="os-text">–</div>
            <div class="info-label">CPU</div><div class="info-value" id="cpu-model-text">–</div>
            <div class="info-label">RAM</div><div class="info-value" id="ram-detail-text">–</div>
            <div class="info-label">Disk</div><div class="info-value" id="disk-detail-text">–</div>
            <div class="info-label">Uptime</div><div class="info-value" id="uptime-text">–</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">Storage & Network</div>

          <div class="metric-row">
            <div class="metric-label">Disk Usage</div>
            <div class="metric-value" id="disk-text">–</div>
          </div>
          <div class="bar" style="margin-bottom: 12px;"><div class="bar-fill" id="disk-bar"></div></div>

          <div class="metric-row">
            <div class="metric-label">Up / Down</div>
            <div class="metric-value" id="net-speed-text">–</div>
          </div>
          <div class="metric-row">
            <div class="metric-label">Total Sent</div>
            <div class="metric-value" id="net-sent-text">–</div>
          </div>
          <div class="metric-row">
            <div class="metric-label">Total Received</div>
            <div class="metric-value" id="net-recv-text">–</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://laptop-stats-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const statsRef = ref(db, "laptop");

    const historyLength = 60;
    const labels = [];
    const cpuHistory = [];
    const ramHistory = [];
    const gpuHistory = [];
    const tempHistory = [];

    const ctx = document.getElementById("perf-chart").getContext("2d");
    const perfChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "CPU %",
            data: cpuHistory,
            borderColor: "#5b8dff",
            backgroundColor: "rgba(91,141,255,0.15)",
            tension: 0.3,
            borderWidth: 2,
            pointRadius: 0
          },
          {
            label: "RAM %",
            data: ramHistory,
            borderColor: "#9b5bff",
            backgroundColor: "rgba(155,91,255,0.12)",
            tension: 0.3,
            borderWidth: 2,
            pointRadius: 0
          },
          {
            label: "GPU %",
            data: gpuHistory,
            borderColor: "#22c55e",
            backgroundColor: "rgba(34,197,94,0.12)",
            tension: 0.3,
            borderWidth: 2,
            pointRadius: 0
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: "#e5e7eb", font: { size: 11 } }
          }
        },
        scales: {
          x: {
            ticks: { color: "#6b7280", maxTicksLimit: 6 },
            grid: { color: "rgba(31,41,55,0.6)" }
          },
          y: {
            min: 0,
            max: 100,
            ticks: { color: "#6b7280" },
            grid: { color: "rgba(31,41,55,0.6)" }
          }
        }
      }
    });

    function pushHistory(label, cpu, ram, gpu) {
      const nowLabel = label;
      labels.push(nowLabel);
      cpuHistory.push(cpu);
      ramHistory.push(ram);
      gpuHistory.push(gpu ?? null);

      if (labels.length > historyLength) {
        labels.shift();
        cpuHistory.shift();
        ramHistory.shift();
        gpuHistory.shift();
      }
      perfChart.update("none");
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function setBar(id, value) {
      const el = document.getElementById(id);
      if (el) el.style.width = Math.max(0, Math.min(100, value)) + "%";
    }

    onValue(statsRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      document.getElementById("status-text").textContent = "Live";
      document.getElementById("status-dot").style.color = "#22c55e";

      const cpu = data.cpu_percent ?? 0;
      const ram = data.ram_percent ?? 0;
      const gpu = data.gpu_usage ?? 0;
      const battery = data.battery_percent ?? 0;
      const disk = data.disk_usage_percent ?? 0;

      setText("cpu-text", cpu.toFixed(0) + "%");
      setText("ram-text", ram.toFixed(0) + "%");
      setText("gpu-text", data.gpu_usage != null ? gpu.toFixed(0) + "%" : "N/A");
      setText("battery-text", data.battery_percent != null ? battery.toFixed(0) + "%" : "N/A");

      setBar("cpu-bar", cpu);
      setBar("ram-bar", ram);
      setBar("gpu-bar", data.gpu_usage != null ? gpu : 0);
      setBar("battery-bar", battery);
      setBar("disk-bar", disk);

      setText("disk-text", disk.toFixed(0) + "%");
      setText("net-speed-text", `${(data.net_up_mbps ?? 0).toFixed(2)} ↑ / ${(data.net_down_mbps ?? 0).toFixed(2)} ↓ Mbps`);
      setText("net-sent-text", (data.net_sent_mb ?? 0).toFixed(1) + " MB");
      setText("net-recv-text", (data.net_recv_mb ?? 0).toFixed(1) + " MB");

      setText("os-text", data.os ?? "–");
      setText("cpu-model-text", data.cpu_model || "–");
      setText("ram-detail-text", data.ram_total_gb != null ? `${data.ram_used_gb.toFixed(1)} / ${data.ram_total_gb.toFixed(1)} GB` : "–");
      setText("disk-detail-text", data.disk_total_gb != null ? `${data.disk_used_gb.toFixed(1)} / ${data.disk_total_gb.toFixed(1)} GB` : "–");
      setText("uptime-text", data.uptime_minutes != null ? `${data.uptime_minutes.toFixed(1)} min` : "–");

      setText("updated", "Updated at " + new Date().toLocaleTimeString());

      pushHistory(new Date().toLocaleTimeString(), cpu, ram, data.gpu_usage);
    });
  </script>
</body>
</html>
