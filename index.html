<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Laptop Stats</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #0b1020; color: #f5f5f5; }
    h1 { margin-bottom: 1rem; }
    .card { background: #151a30; padding: 1.5rem; border-radius: 0.75rem; max-width: 400px; }
    .row { display: flex; justify-content: space-between; margin: 0.25rem 0; }
    .label { opacity: 0.7; }
    .value { font-weight: 600; }
  </style>
</head>
<body>
  <h1>Laptop Stats</h1>
  <div class="card">
    <div class="row"><span class="label">CPU</span><span class="value" id="cpu">–</span></div>
    <div class="row"><span class="label">RAM</span><span class="value" id="ram">–</span></div>
    <div class="row"><span class="label">Battery</span><span class="value" id="battery">–</span></div>
    <div class="row"><span class="label">Last update</span><span class="value" id="updated">–</span></div>
  </div>

  <script>
    const URL = "https://laptop-stats-default-rtdb.europe-west1.firebasedatabase.app/laptop.json";

    async function loadStats() {
      try {
        const res = await fetch(URL);
        const data = await res.json();

        document.getElementById("cpu").textContent = data.cpu + "%";
        document.getElementById("ram").textContent = data.ram + "%";
        document.getElementById("battery").textContent = data.battery + "%";
        document.getElementById("updated").textContent = new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById("updated").textContent = "error";
      }
    }

    loadStats();
    setInterval(loadStats, 5000);
  </script>
</body>
</html>
